<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPageKiller — School Management</title>
    <script>
      // Recover a route saved by 404.html (spa-github-pages pattern).
      (function () {
        var r = sessionStorage.getItem('spa-redirect');
        if (r) {
          sessionStorage.removeItem('spa-redirect');
          window.history.replaceState(null, null, r);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
